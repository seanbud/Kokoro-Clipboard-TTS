name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
          - platform: macos-13
            target: universal-apple-darwin

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target == 'universal-apple-darwin' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt
          python -m spacy download en_core_web_sm

      - name: Download Kokoro Model Weights
        shell: bash
        run: |
          mkdir -p sidecar/model
          # Download official Kokoro-82M model weights/voices
          curl -L -o sidecar/model/kokoro-v0.19.onnx https://github.com/hexgrad/kokoro/raw/main/kokoro-v0.19.onnx
          curl -L -o sidecar/model/voices.json https://github.com/hexgrad/kokoro/raw/main/voices.json

      - name: Build Sidecar with PyInstaller
        shell: bash
        run: |
          # Use platform-specific separator for --add-data
          if [ "${{ matrix.platform }}" == "windows-latest" ]; then
            SEP=";"
          else
            SEP=":"
          fi
          pyinstaller --onefile --name kokoro \
            --add-data "sidecar/model${SEP}model" \
            --collect-all onnxruntime \
            --collect-all kokoro \
            --collect-all misaki \
            --collect-all phonemizer \
            --collect-all language_tags \
            --collect-all espeakng_loader \
            --collect-all huggingface_hub \
            --collect-all sounddevice \
            --collect-all soundfile \
            --collect-all torch \
            --collect-all loguru \
            --collect-all transformers \
            --collect-all spacy \
            --collect-all en_core_web_sm \
            sidecar/kokoro_server.py
          mkdir -p src-tauri/binaries
          if [ "${{ matrix.platform }}" == "windows-latest" ]; then
            mv dist/kokoro.exe src-tauri/binaries/kokoro-x86_64-pc-windows-msvc.exe
          else
            # Tauri universal builds expect the sidecar named with the universal triple
            mv dist/kokoro src-tauri/binaries/kokoro-universal-apple-darwin
          fi

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend tests
        run: npx vitest run

      - name: Run Rust tests
        working-directory: src-tauri
        run: cargo test

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Kokoro Clipboard TTS ${{ github.ref_name }}"
          releaseBody: "See the assets below to download and install."
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.target == 'universal-apple-darwin' && '--target universal-apple-darwin' || '' }}

  # Generate latest.json for auto-updater after all builds complete
  publish-updater:
    needs: build
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate latest.json
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          updaterJsonKeepUniversal: true
